<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Matrix Sommativo V6</title>
    <style>
        :root {
            --primary: #1e1b4b;
            --accent: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --ambata-bg: #ffe4e6;
            --ambata-txt: #e11d48;
            --ambo-bg: #ccfbf1;
            --ambo-txt: #0d9488;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 12px;
        }
        .container { max-width: 550px; margin: 0 auto; }
        header {
            text-align: center; margin-bottom: 16px;
            background: linear-gradient(135deg, #1e1b4b, #312e81);
            padding: 16px; border-radius: 12px; color: white;
        }
        header h1 { margin: 0 0 4px 0; font-size: 1.3rem; }
        .info-concorso { font-size: 0.85rem; color: #818cf8; margin: 0; }
        .card-ruota {
            background: var(--card-bg); border-radius: 12px; padding: 14px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border-left: 5px solid var(--accent);
            margin-bottom: 12px;
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .ruota-title { font-size: 1.1rem; font-weight: 700; text-transform: uppercase; color: var(--primary); }
        .spia-badge { background: #e0e7ff; color: #4338ca; font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; font-weight: 700; }
        .palline-box { display: flex; gap: 6px; margin-bottom: 12px; }
        .pallina {
            width: 30px; height: 30px; background: #f1f5f9; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.85rem;
        }
        .pallina.first { background: #4f46e5; color: white; }
        .previsione-box { display: flex; gap: 8px; margin-bottom: 8px; }
        .prev-item { flex: 1; padding: 8px; border-radius: 8px; text-align: center; }
        .prev-item.ambata { background: var(--ambata-bg); color: var(--ambata-txt); }
        .prev-item.ambo { background: var(--ambo-bg); color: var(--ambo-txt); }
        .prev-label { font-size: 0.7rem; text-transform: uppercase; font-weight: 700; margin-bottom: 2px; }
        .prev-value { font-size: 1.1rem; font-weight: 800; }
        .ambetti-box {
            background: #f8fafc; border: 1px dashed #cbd5e1; padding: 6px; border-radius: 8px;
            font-size: 0.75rem; text-align: center;
        }
        .ambetti-title { font-size: 0.65rem; text-transform: uppercase; color: #64748b; font-weight: 700; margin-bottom: 2px; }
        .ambetti-valori { color: #475569; font-weight: 600; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Lotto Matrix V6</h1>
        <p id="info-concorso" class="info-concorso">Algoritmo Sommativo Attivo</p>
    </header>
    <div id="ruote-list"></div>
</div>

<script>
    async function caricaRisultati() {
        try {
            const response = await fetch('risultati_v4.json?t=' + new Date().getTime());
            const data = await response.json();
            const container = document.getElementById('ruote-list');
            container.innerHTML = ''; 

            for (const [ruota, info] of Object.entries(data.previsioni)) {
                const card = document.createElement('div');
                card.className = 'card-ruota';
                
                // Evidenzia visivamente il primo estratto che genera il calcolo
                const pallineHTML = info.numeri_estrazione.map((num, idx) => 
                    `<div class="pallina ${idx === 0 ? 'first' : ''}">${num}</div>`
                ).join('');
                
                const ambettiString = info.ambetti.map(a => a.join('-')).join(' | ');

                card.innerHTML = `
                    <div class="card-header">
                        <span class="ruota-title">${ruota}</span>
                        <span class="spia-badge">Base Calcolo: ${info.spia}</span>
                    </div>
                    <div class="palline-box">${pallineHTML}</div>
                    <div class="previsione-box">
                        <div class="prev-item ambata"><div class="prev-label">Ambata</div><div class="prev-value">${info.ambata}</div></div>
                        <div class="prev-item ambo"><div class="prev-label">Ambo Secco</div><div class="prev-value">${info.ambo.join(' - ')}</div></div>
                    </div>
                    <div class="ambetti-box">
                        <div class="ambetti-title">Recupero Ambetto</div>
                        <div class="ambetti-valori">${ambettiString}</div>
                    </div>
                `;
                container.appendChild(card);
            }
        } catch (e) {}
    }
    window.onload = caricaRisultati;
</script>
</body>
</html>
