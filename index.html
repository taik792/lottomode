<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pannello Previsioni Lotto</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 5px;
        }
        .info-concorso {
            text-align: center;
            color: #7f8c8d;
            font-size: 1.1em;
            margin-bottom: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px 15px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background-color: #34495e;
            color: #fff;
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 1px;
        }
        tr:hover {
            background-color: #f9f9f9;
        }
        .ruota-name {
            font-weight: bold;
            color: #2980b9;
            text-transform: capitalize;
        }
        .estrazione-numeri {
            color: #555;
            letter-spacing: 2px;
        }
        .evidenziato-ambata {
            font-weight: bold;
            color: #e74c3c;
            background-color: #fadbd8;
            padding: 5px 10px;
            border-radius: 4px;
            display: inline-block;
        }
        .evidenziato-ambo {
            font-weight: bold;
            color: #27ae60;
            background-color: #d4efdf;
            padding: 5px 10px;
            border-radius: 4px;
            display: inline-block;
            letter-spacing: 3px;
        }
        .error-message {
            color: #c0392b;
            text-align: center;
            font-weight: bold;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Previsioni del Motore Lotto v4</h1>
    <div id="info-concorso" class="info-concorso">Caricamento dati in corso...</div>

    <table id="tabella-risultati" style="display: none;">
        <thead>
            <tr>
                <th>Ruota</th>
                <th>Numeri Estratti</th>
                <th>Ambata Calcolata</th>
                <th>Ambo Consigliato</th>
            </tr>
        </thead>
        <tbody id="corpo-tabella">
            <!-- I dati verranno inseriti qui dallo script JS -->
        </tbody>
    </table>
    <div id="errore" class="error-message" style="display: none;"></div>
</div>

<script>
    // Funzione per caricare il file JSON dei risultati
    async function caricaRisultati() {
        try {
            const response = await fetch('risultati_v4.json');
            if (!response.ok) {
                throw new Error("Impossibile caricare il file risultati_v4.json. Verifica che il motore sia stato eseguito.");
            }
            const data = await response.json();
            
            // Aggiorna info concorso
            document.getElementById('info-concorso').innerHTML = 
                `Elaborazione basata sul concorso <strong>n. ${data.info_concorso.numero}</strong> del <strong>${data.info_concorso.data}</strong>`;
            
            const corpoTabella = document.getElementById('corpo-tabella');
            corpoTabella.innerHTML = ''; // Svuota tabella
            
            // Cicla sulle previsioni delle ruote
            for (const [ruota, info] of Object.entries(data.previsioni)) {
                const tr = document.createElement('tr');
                
                // Cella Ruota
                const tdRuota = document.createElement('td');
                tdRuota.className = 'ruota-name';
                tdRuota.textContent = ruota;
                tr.appendChild(tdRuota);
                
                // Cella Numeri Estratti
                const tdEstratti = document.createElement('td');
                tdEstratti.className = 'estrazione-numeri';
                tdEstratti.textContent = info.numeri_estrazione.join(' - ');
                tr.appendChild(tdEstratti);
                
                // Cella Ambata
                const tdAmbata = document.createElement('td');
                tdAmbata.innerHTML = `<span class="evidenziato-ambata">${info.ambata}</span>`;
                tr.appendChild(tdAmbata);
                
                // Cella Ambo
                const tdAmbo = document.createElement('td');
                tdAmbo.innerHTML = `<span class="evidenziato-ambo">${info.ambo.join(' - ')}</span>`;
                tr.appendChild(tdAmbo);
                
                corpoTabella.appendChild(tr);
            }
            
            // Mostra la tabella
            document.getElementById('tabella-risultati').style.display = 'table';
            
        } catch (error) {
            document.getElementById('info-concorso').style.display = 'none';
            const divErrore = document.getElementById('errore');
            divErrore.textContent = error.message;
            divErrore.style.display = 'block';
        }
    }

    // Avvia il caricamento al caricamento della pagina
    window.onload = caricaRisultati;
</script>

</body>
</html>
