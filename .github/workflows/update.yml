name: Lotto Bot

on:
  schedule:
    - cron: "*/30 * * * *"  # ogni 30 minuti
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clona repository
        uses: actions/checkout@v3

      - name: Installa Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          pip install requests

      - name: Esegui algoritmo
        run: |
          python genera_risultati.py

      - name: Commit risultati
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add risultati.json
          git commit -m "Aggiornamento automatico risultati" || echo "Nessuna modifica"
          git push
