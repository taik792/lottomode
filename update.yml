name: Lotto Bot V4

on:
  schedule:
    - cron: "*/30 * * * *" # Ogni 30 minuti
  workflow_dispatch: # Permette l'avvio manuale

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: # Permessi di scrittura necessari
      contents: write
    steps:
      - name: Clona repository
        uses: actions/checkout@v3

      - name: Installa Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Esegui algoritmo
        run: python genera_risultati.py

      - name: Commit risultati
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add risultati_v4.json
          git commit -m "Update risultati V4" || echo "Nessuna modifica"
          git push
